<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slice Of Life — Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Neonderthaw&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }

    body{
      font-family:'Poppins', sans-serif;
      min-height:100vh;
      background:radial-gradient(circle at top,#2a1459 0%,#0f0f0f 60%);
      color:white;
      padding:40px 8%;
    }

    .logo{
      font-family:'Neonderthaw', cursive;
      font-size:54px;
      color:#b26cff;
      text-shadow:0 0 12px rgba(178,108,255,0.8),0 0 28px rgba(178,108,255,0.5);
      margin-bottom:35px;
    }

    .layout{
      display:grid;
      grid-template-columns:0.9fr 1.1fr;
      gap:28px;
    }

    .card{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.15);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border-radius:24px;
      padding:28px;
      box-shadow:0 8px 32px rgba(0,0,0,0.35);
      margin-bottom:28px;
    }

    .card h2{
      color:#b26cff;
      margin-bottom:20px;
    }

    .avatar-box{
      display:flex;
      justify-content:center;
      margin-bottom:24px;
    }

    .pixel-avatar{
      width:180px;
      height:180px;
      image-rendering:pixelated;
      object-fit:contain;
      border-radius:18px;
      border:2px solid rgba(178,108,255,0.4);
      background:rgba(0,0,0,0.25);
      padding:12px;
      box-shadow:0 0 25px rgba(178,108,255,0.25);
    }

    .profile-item{
      margin-bottom:16px;
      font-size:18px;
    }

    .profile-item strong{
      color:#d8c2ff;
    }

    .xp-bar{
      width:100%;
      height:18px;
      background:rgba(255,255,255,0.1);
      border-radius:999px;
      overflow:hidden;
      margin-top:12px;
    }

    .xp-fill{
      width:0%;
      height:100%;
      background:#b26cff;
      border-radius:999px;
      box-shadow:0 0 18px rgba(178,108,255,0.8);
      transition:0.4s;
    }

    label{
      display:block;
      margin-bottom:8px;
      color:#e2e2e2;
      font-weight:500;
    }

    input, select{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(0,0,0,0.35);
      color:white;
      outline:none;
      margin-bottom:18px;
      font-size:15px;
    }

    select option{ background:#171717; }

    .btn{
      padding:14px 22px;
      border:none;
      border-radius:14px;
      background:rgba(178,108,255,0.25);
      color:white;
      font-weight:700;
      cursor:pointer;
      border:1px solid rgba(255,255,255,0.15);
      transition:0.3s;
    }

    .btn:hover{
      transform:translateY(-3px);
      background:rgba(178,108,255,0.38);
      box-shadow:0 0 24px rgba(178,108,255,0.35);
    }

    .quest, .shop-item{
      padding:20px;
      border-radius:18px;
      background:rgba(0,0,0,0.25);
      border:1px solid rgba(255,255,255,0.1);
      margin-bottom:16px;
      display:flex;
      justify-content:space-between;
      gap:18px;
      align-items:center;
    }

    .quest h3, .shop-item h3{
      margin-bottom:8px;
      font-size:19px;
    }

    .quest p, .shop-item p{
      color:#cfcfcf;
      line-height:1.6;
      font-size:14px;
    }

    .quest-actions, .shop-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .complete-btn{ background:#b26cff; }

    .delete-btn, .logout-btn{
      background:rgba(255,80,100,0.25);
    }

    .logout-btn{ margin-left:12px; }

    .message{
      color:#d8c2ff;
      min-height:24px;
      margin-top:14px;
    }

    .empty{
      color:#bdbdbd;
      line-height:1.6;
    }

    .top-links{
      margin-bottom:24px;
    }

    .top-links a{
      color:#cfcfcf;
      text-decoration:none;
      margin-right:18px;
    }

    .top-links a:hover{ color:#b26cff; }

    @media(max-width:950px){
      .layout{ grid-template-columns:1fr; }

      .quest, .shop-item{
        flex-direction:column;
        align-items:flex-start;
      }

      .quest-actions, .shop-actions{
        justify-content:flex-start;
      }
    }
  </style>
</head>

<body>

  <div class="logo">Slice Of Life</div>

  <div class="top-links">
    <a href="index.html">← Início</a>
    <a href="jornada.html">Refazer personagem</a>
    <button class="btn logout-btn" onclick="logout()">Sair</button>
  </div>

  <main class="layout">

    <section>

      <div class="card">
        <h2>Perfil</h2>

        <div class="avatar-box">
          <img id="player-avatar" class="pixel-avatar" src="" alt="Avatar">
        </div>

        <div class="profile-item">
          <strong>Usuário:</strong>
          <span id="logged-user">Não logado</span>
        </div>

        <div class="profile-item">
          <strong>Nome:</strong>
          <span id="player-name">Não criado</span>
        </div>

        <div class="profile-item">
          <strong>Classe:</strong>
          <span id="player-class">Nenhuma</span>
        </div>

        <div class="profile-item">
          <strong>Nível:</strong>
          <span id="level">1</span>
        </div>

        <div class="profile-item">
          <strong>Moedas:</strong>
          <span id="coins">0</span> 🪙
        </div>

        <div class="profile-item">
          <strong>XP:</strong>
          <span id="xp">0</span>/100
        </div>

        <div class="profile-item">
          <strong>Streak:</strong>
          🔥 <span id="streak">0</span> dias
        </div>

        <div class="profile-item">
          <strong>Última atividade:</strong>
          <span id="last-activity">Nenhuma</span>
        </div>

        <div class="profile-item">
          <strong>Companheiro:</strong>
          <span id="equipped-pet">Nenhum</span>
        </div>

        <div class="xp-bar">
          <div class="xp-fill" id="xp-fill"></div>
        </div>

        <p class="message" id="profile-message"></p>
      </div>

      <div class="card">
        <h2>Criar Quest</h2>

        <label for="quest-name">Nome da quest</label>
        <input type="text" id="quest-name" placeholder="Ex: Estudar matemática">

        <label for="quest-icon">Ícone</label>
        <select id="quest-icon">
          <option value="📘">📘 Livro</option>
          <option value="🧹">🧹 Organização</option>
          <option value="💧">💧 Água</option>
          <option value="🌙">🌙 Descanso</option>
          <option value="🏃">🏃 Exercício</option>
          <option value="🎧">🎧 Música/Foco</option>
          <option value="🖋️">🖋️ Escrita</option>
          <option value="🧘">🧘 Meditação</option>
          <option value="🍱">🍱 Alimentação</option>
          <option value="✨">✨ Especial</option>
        </select>

        <label for="quest-xp">XP da quest</label>
        <input type="number" id="quest-xp" placeholder="Ex: 25">

        <label for="quest-coins">Moedas da quest</label>
        <input type="number" id="quest-coins" placeholder="Ex: 10">

        <label for="quest-weekly">Quantas vezes por semana?</label>
        <input type="number" id="quest-weekly" placeholder="Ex: 5">

        <button class="btn" onclick="addQuest()">Adicionar Quest</button>

        <p class="message" id="quest-message"></p>
      </div>

    </section>

    <section>

      <div class="card">
        <h2>Quests da Rotina</h2>
        <div id="quest-list">
          <p class="empty">Nenhuma quest criada ainda.</p>
        </div>
      </div>

      <div class="card">
        <h2>Loja de Companheiros</h2>
        <div id="shop-list"></div>
        <p class="message" id="shop-message"></p>
      </div>

    </section>

  </main>

  <script>
    const loggedUser = localStorage.getItem("loggedUser");

    if(!loggedUser){
      window.location.href = "login.html";
    }

    let playerName = localStorage.getItem("playerName") || "Não criado";
    let playerClass = localStorage.getItem("playerClass") || "Nenhuma";
    let playerGender = localStorage.getItem("playerGender") || "masculino";

    let level = Number(localStorage.getItem("level")) || 1;
    let xp = Number(localStorage.getItem("xp")) || 0;
    let coins = Number(localStorage.getItem("coins")) || 0;

    let streak = Number(localStorage.getItem("streak")) || 0;
    let lastActivity = localStorage.getItem("lastActivity") || "";

    let quests = JSON.parse(localStorage.getItem("quests")) || [];
    let ownedPets = JSON.parse(localStorage.getItem("ownedPets")) || [];
    let equippedPet = localStorage.getItem("equippedPet") || "";

    const shopItems = [
      {
        id:"gato",
        name:"Gato",
        emoji:"🐈",
        price:120,
        description:"Um companheiro calmo que observa sua rotina em silêncio."
      },
      {
        id:"cachorro",
        name:"Cachorro",
        emoji:"🐕",
        price:140,
        description:"Um amigo leal para acompanhar seus pequenos recomeços."
      },
      {
        id:"pardal",
        name:"Pardal de Ombro",
        emoji:"🐦",
        price:180,
        description:"Um pequeno pássaro que repousa perto do personagem."
      },
      {
        id:"passaro-branco",
        name:"Pequeno Pássaro Branco",
        emoji:"🕊️",
        price:220,
        description:"Um companheiro leve, quase como uma lembrança tranquila."
      },
      {
        id:"fantasma",
        name:"Fantasminha Flutuante",
        emoji:"👻",
        price:450,
        description:"Um espírito gentil que flutua ao lado do personagem."
      },
      {
        id:"kitsune",
        name:"Kitsune",
        emoji:"🦊",
        price:900,
        description:"Uma raposa espiritual rara, silenciosa e elegante."
      },
      {
        id:"tamamo",
        name:"Tamamo-no-Mae",
        emoji:"🌸",
        price:2500,
        description:"Companheira lendária. Um objetivo de longo prazo."
      }
    ];

    function saveProgress(){
      localStorage.setItem("level", level);
      localStorage.setItem("xp", xp);
      localStorage.setItem("coins", coins);
      localStorage.setItem("streak", streak);
      localStorage.setItem("lastActivity", lastActivity);
      localStorage.setItem("quests", JSON.stringify(quests));
      localStorage.setItem("ownedPets", JSON.stringify(ownedPets));
      localStorage.setItem("equippedPet", equippedPet);
    }

    function updateProfile(){
      const avatar = document.getElementById("player-avatar");

      if(playerGender === "masculino"){
        avatar.src = "avatar-masculino.png";
      }else{
        avatar.src = "avatar-feminino.png";
      }

      document.getElementById("logged-user").innerText = loggedUser;
      document.getElementById("player-name").innerText = playerName;
      document.getElementById("player-class").innerText = playerClass;
      document.getElementById("level").innerText = level;
      document.getElementById("xp").innerText = xp;
      document.getElementById("coins").innerText = coins;
      document.getElementById("streak").innerText = streak;
      document.getElementById("last-activity").innerText = lastActivity || "Nenhuma";

      const pet = shopItems.find(item => item.id === equippedPet);
      document.getElementById("equipped-pet").innerText = pet ? `${pet.emoji} ${pet.name}` : "Nenhum";

      document.getElementById("xp-fill").style.width = xp + "%";
    }

    function addQuest(){
      const name = document.getElementById("quest-name").value;
      const icon = document.getElementById("quest-icon").value;
      const questXp = Number(document.getElementById("quest-xp").value);
      const questCoins = Number(document.getElementById("quest-coins").value);
      const weeklyLimit = Number(document.getElementById("quest-weekly").value);

      if(name.trim() === ""){
        document.getElementById("quest-message").innerText = "Digite o nome da quest.";
        return;
      }

      if(questXp <= 0 || questCoins <= 0 || weeklyLimit <= 0){
        document.getElementById("quest-message").innerText = "Preencha XP, moedas e repetições corretamente.";
        return;
      }

      if(weeklyLimit > 7){
        document.getElementById("quest-message").innerText = "O limite máximo é 7 vezes por semana.";
        return;
      }

      const newQuest = {
        id: Date.now(),
        name: name,
        icon: icon,
        xp: questXp,
        coins: questCoins,
        weeklyLimit: weeklyLimit,
        completedThisWeek: 0
      };

      quests.push(newQuest);
      saveProgress();
      renderQuests();

      document.getElementById("quest-name").value = "";
      document.getElementById("quest-xp").value = "";
      document.getElementById("quest-coins").value = "";
      document.getElementById("quest-weekly").value = "";

      document.getElementById("quest-message").innerText = "Quest adicionada.";
    }

    function renderQuests(){
      const questList = document.getElementById("quest-list");

      if(quests.length === 0){
        questList.innerHTML = '<p class="empty">Nenhuma quest criada ainda.</p>';
        return;
      }

      questList.innerHTML = "";

      quests.forEach(function(quest){
        const canComplete = quest.completedThisWeek < quest.weeklyLimit;

        const questElement = document.createElement("div");
        questElement.className = "quest";

        questElement.innerHTML = `
          <div>
            <h3>${quest.icon} ${quest.name}</h3>
            <p>
              Recompensa: +${quest.xp} XP • +${quest.coins} moedas<br>
              Repetições: ${quest.completedThisWeek}/${quest.weeklyLimit}
            </p>
          </div>

          <div class="quest-actions">
            <button class="btn complete-btn" onclick="completeQuest(${quest.id})" ${canComplete ? "" : "disabled"}>
              ${canComplete ? "Concluir" : "Limite atingido"}
            </button>

            <button class="btn delete-btn" onclick="deleteQuest(${quest.id})">
              Apagar
            </button>
          </div>
        `;

        questList.appendChild(questElement);
      });
    }

    function updateStreak(){
      const today = new Date().toLocaleDateString("pt-BR");

      if(lastActivity === today){
        return;
      }

      if(lastActivity === ""){
        streak = 1;
        lastActivity = today;
        return;
      }

      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayFormatted = yesterday.toLocaleDateString("pt-BR");

      if(lastActivity === yesterdayFormatted){
        streak++;
      }else{
        streak = 1;
      }

      lastActivity = today;
    }

    function completeQuest(id){
      const quest = quests.find(item => item.id === id);

      if(!quest){
        return;
      }

      if(quest.completedThisWeek >= quest.weeklyLimit){
        document.getElementById("profile-message").innerText = "Limite semanal atingido.";
        return;
      }

      xp += quest.xp;
      coins += quest.coins;
      quest.completedThisWeek++;

      updateStreak();

      while(xp >= 100){
        level++;
        xp -= 100;
      }

      saveProgress();
      updateProfile();
      renderQuests();
      renderShop();

      document.getElementById("profile-message").innerText =
        `Quest concluída: +${quest.xp} XP e +${quest.coins} moedas.`;
    }

    function deleteQuest(id){
      quests = quests.filter(quest => quest.id !== id);
      saveProgress();
      renderQuests();

      document.getElementById("profile-message").innerText = "Quest apagada.";
    }

    function renderShop(){
      const shopList = document.getElementById("shop-list");
      shopList.innerHTML = "";

      shopItems.forEach(function(item){
        const owned = ownedPets.includes(item.id);
        const equipped = equippedPet === item.id;

        const shopElement = document.createElement("div");
        shopElement.className = "shop-item";

        shopElement.innerHTML = `
          <div>
            <h3>${item.emoji} ${item.name}</h3>
            <p>
              Preço: ${item.price} moedas<br>
              ${item.description}
            </p>
          </div>

          <div class="shop-actions">
            <button class="btn" onclick="${owned ? `equipPet('${item.id}')` : `buyPet('${item.id}')`}">
              ${equipped ? "Equipado" : owned ? "Equipar" : "Comprar"}
            </button>
          </div>
        `;

        shopList.appendChild(shopElement);
      });
    }

    function buyPet(id){
      const item = shopItems.find(pet => pet.id === id);

      if(!item){
        return;
      }

      if(ownedPets.includes(id)){
        equipPet(id);
        return;
      }

      if(coins < item.price){
        document.getElementById("shop-message").innerText =
          "Moedas insuficientes para comprar " + item.name + ".";
        return;
      }

      coins -= item.price;
      ownedPets.push(id);
      equippedPet = id;

      saveProgress();
      updateProfile();
      renderShop();

      document.getElementById("shop-message").innerText =
        "Você comprou e equipou: " + item.name + ".";
    }

    function equipPet(id){
      equippedPet = id;

      saveProgress();
      updateProfile();
      renderShop();

      const item = shopItems.find(pet => pet.id === id);

      document.getElementById("shop-message").innerText =
        "Companheiro equipado: " + item.name + ".";
    }

    function logout(){
      localStorage.removeItem("loggedUser");
      window.location.href = "login.html";
    }

    updateProfile();
    renderQuests();
    renderShop();
  </script>

</body>
</html>
