<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Slice Of Life — Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Neonderthaw&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins', sans-serif;
      min-height:100vh;

      background:
      radial-gradient(circle at top,
      #2a1459 0%,
      #0f0f0f 60%);

      color:white;

      padding:40px 8%;
    }

    .logo{
      font-family:'Neonderthaw', cursive;
      font-size:48px;
      color:#b26cff;

      text-shadow:
      0 0 12px rgba(178,108,255,0.8),
      0 0 28px rgba(178,108,255,0.5);

      margin-bottom:40px;
    }

    .layout{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:28px;
    }

    .card{
      background:rgba(255,255,255,0.06);

      border:1px solid rgba(255,255,255,0.15);

      backdrop-filter:blur(12px);

      border-radius:24px;

      padding:28px;

      box-shadow:0 8px 32px rgba(0,0,0,0.35);
    }

    .card h2{
      margin-bottom:20px;
      color:#b26cff;
    }

    .profile-item{
      margin-bottom:16px;
      font-size:18px;
    }

    .profile-item strong{
      color:#d8c2ff;
    }

    .xp-bar{
      width:100%;
      height:18px;

      background:rgba(255,255,255,0.08);

      border-radius:999px;

      overflow:hidden;

      margin-top:12px;
    }

    .xp-fill{
      width:20%;
      height:100%;

      background:#b26cff;

      border-radius:999px;

      box-shadow:
      0 0 18px rgba(178,108,255,0.8);
    }

    .mission{
      padding:18px;

      border-radius:18px;

      background:rgba(0,0,0,0.25);

      margin-bottom:16px;

      border:1px solid rgba(255,255,255,0.08);
    }

    .mission h3{
      margin-bottom:8px;
    }

    .mission p{
      color:#cfcfcf;
      margin-bottom:12px;
    }

    button{
      padding:12px 18px;

      border:none;

      border-radius:12px;

      background:#b26cff;

      color:white;

      cursor:pointer;

      transition:0.3s;
    }

    button:hover{
      transform:translateY(-3px);
    }

    @media(max-width:900px){

      .layout{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

  <div class="logo">
    Slice Of Life
  </div>

  <div class="layout">

    <!-- PERFIL -->

    <div class="card">

      <h2>Perfil</h2>

      <div class="profile-item">
        <strong>Nome:</strong>
        <span id="player-name"></span>
      </div>

      <div class="profile-item">
        <strong>Classe:</strong>
        <span id="player-class"></span>
      </div>

      <div class="profile-item">
        <strong>Nível:</strong>
        1
      </div>

      <div class="profile-item">
        <strong>Moedas:</strong>
        0 🪙
      </div>

      <div class="profile-item">
        <strong>XP:</strong>
        20/100
      </div>

      <div class="xp-bar">
        <div class="xp-fill"></div>
      </div>

    </div>

    <!-- MISSÕES -->

    <div class="card">

      <h2>Missões</h2>

      <div class="mission">

        <h3>
          📘 Estudar por 30 minutos
        </h3>

        <p>
          Recompensa:
          +20 XP • +10 moedas
        </p>

        <button>
          Concluir Missão
        </button>

      </div>

      <div class="mission">

        <h3>
          🌙 Descansar sem culpa
        </h3>

        <p>
          Recompensa:
          +15 XP • +8 moedas
        </p>

        <button>
          Concluir Missão
        </button>

      </div>

    </div>

  </div>

  <script>

    // RECUPERA DADOS

    const nome =
      localStorage.getItem("playerName");

    const classe =
      localStorage.getItem("playerClass");

    // MOSTRA NA TELA

    document.getElementById("player-name")
      .innerText = nome;

    document.getElementById("player-class")
      .innerText = classe;

  </script>

</body>
</html>
