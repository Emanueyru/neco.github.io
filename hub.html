<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slice Of Life — Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Neonderthaw&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins', sans-serif;
      min-height:100vh;

      background:
      radial-gradient(circle at top,
      #2a1459 0%,
      #0f0f0f 60%);

      color:white;

      padding:40px 8%;
    }

    .logo{
      font-family:'Neonderthaw', cursive;
      font-size:54px;
      color:#b26cff;

      text-shadow:
      0 0 12px rgba(178,108,255,0.8),
      0 0 28px rgba(178,108,255,0.5);

      margin-bottom:35px;
    }

    .layout{
      display:grid;
      grid-template-columns:0.9fr 1.1fr;
      gap:28px;
    }

    .card{
      background:rgba(255,255,255,0.06);

      border:1px solid rgba(255,255,255,0.15);

      backdrop-filter:blur(12px);

      border-radius:24px;

      padding:28px;

      box-shadow:0 8px 32px rgba(0,0,0,0.35);

      margin-bottom:28px;
    }

    .card h2{
      color:#b26cff;
      margin-bottom:20px;
    }

    .avatar-box{
      display:flex;
      justify-content:center;
      margin-bottom:24px;
    }

    .pixel-avatar{
      width:180px;
      height:180px;

      image-rendering:pixelated;

      object-fit:contain;

      border-radius:18px;

      border:2px solid rgba(178,108,255,0.4);

      background:rgba(0,0,0,0.25);

      padding:12px;

      box-shadow:
      0 0 25px rgba(178,108,255,0.25);
    }

    .profile-item{
      margin-bottom:16px;
      font-size:18px;
    }

    .profile-item strong{
      color:#d8c2ff;
    }

    .xp-bar{
      width:100%;
      height:18px;

      background:rgba(255,255,255,0.1);

      border-radius:999px;

      overflow:hidden;

      margin-top:12px;
    }

    .xp-fill{
      width:0%;
      height:100%;

      background:#b26cff;

      border-radius:999px;

      box-shadow:
      0 0 18px rgba(178,108,255,0.8);

      transition:0.4s;
    }

    label{
      display:block;
      margin-bottom:8px;
      color:#e2e2e2;
      font-weight:500;
    }

    input,
    select{
      width:100%;
      padding:14px;

      border-radius:14px;

      border:1px solid rgba(255,255,255,0.15);

      background:rgba(0,0,0,0.35);

      color:white;

      outline:none;

      margin-bottom:18px;

      font-size:15px;
    }

    select option{
      background:#171717;
    }

    .btn{
      padding:14px 22px;

      border:none;

      border-radius:14px;

      background:rgba(178,108,255,0.25);

      color:white;

      font-weight:700;

      cursor:pointer;

      border:1px solid rgba(255,255,255,0.15);

      transition:0.3s;
    }

    .btn:hover{
      transform:translateY(-3px);

      background:rgba(178,108,255,0.38);

      box-shadow:
      0 0 24px rgba(178,108,255,0.35);
    }

    .danger-btn{
      background:rgba(255,80,100,0.25);
    }

    .quest,
    .shop-item,
    .inventory-item{
      padding:20px;

      border-radius:18px;

      background:rgba(0,0,0,0.25);

      border:1px solid rgba(255,255,255,0.1);

      margin-bottom:16px;

      display:flex;

      justify-content:space-between;

      gap:18px;

      align-items:center;
    }

    .quest h3,
    .shop-item h3,
    .inventory-item h3{
      margin-bottom:8px;
      font-size:19px;
    }

    .quest p,
    .shop-item p,
    .inventory-item p{
      color:#cfcfcf;
      line-height:1.6;
      font-size:14px;
    }

    .message{
      color:#d8c2ff;
      min-height:24px;
      margin-top:14px;
    }

    .top-links{
      margin-bottom:24px;
    }

    .top-links a{
      color:#cfcfcf;
      text-decoration:none;
      margin-right:18px;
    }

    .top-links a:hover{
      color:#b26cff;
    }

    .empty{
      color:#bdbdbd;
      line-height:1.6;
    }

    @media(max-width:950px){

      .layout{
        grid-template-columns:1fr;
      }

      .quest,
      .shop-item,
      .inventory-item{
        flex-direction:column;
        align-items:flex-start;
      }
    }

  </style>
</head>

<body>

  <div class="logo">
    Slice Of Life
  </div>

  <div class="top-links">
    <a href="index.html">← Início</a>
    <a href="jornada.html">Refazer personagem</a>

    <button
      class="btn danger-btn"
      onclick="logout()">

      Sair

    </button>
  </div>

  <main class="layout">

    <!-- COLUNA ESQUERDA -->

    <section>

      <!-- PERFIL -->

      <div class="card">

        <h2>Perfil</h2>

        <div class="avatar-box">

          <img
            id="player-avatar"
            class="pixel-avatar"
            src=""
            alt="Avatar">

        </div>

        <div class="profile-item">
          <strong>Usuário:</strong>
          <span id="logged-user"></span>
        </div>

        <div class="profile-item">
          <strong>Nome:</strong>
          <span id="player-name"></span>
        </div>

        <div class="profile-item">
          <strong>Classe:</strong>
          <span id="player-class"></span>
        </div>

        <div class="profile-item">
          <strong>Nível:</strong>
          <span id="level"></span>
        </div>

        <div class="profile-item">
          <strong>Moedas:</strong>
          <span id="coins"></span> 🪙
        </div>

        <div class="profile-item">
          <strong>XP:</strong>
          <span id="xp"></span>/100
        </div>

        <div class="profile-item">
          <strong>Streak:</strong>
          🔥 <span id="streak"></span> dias
        </div>

        <div class="profile-item">
          <strong>Companheiro Equipado:</strong>
          <span id="equipped-pet">Nenhum</span>
        </div>

        <div class="xp-bar">
          <div class="xp-fill" id="xp-fill"></div>
        </div>

      </div>

      <!-- CRIAR QUEST -->

      <div class="card">

        <h2>Criar Quest</h2>

        <label>Nome da Quest</label>

        <input
          type="text"
          id="quest-name"
          placeholder="Ex: Estudar matemática">

        <label>Ícone</label>

        <select id="quest-icon">

          <option value="📘">📘 Livro</option>
          <option value="🧹">🧹 Organização</option>
          <option value="💧">💧 Água</option>
          <option value="🌙">🌙 Descanso</option>
          <option value="🏃">🏃 Exercício</option>
          <option value="🎧">🎧 Música</option>
          <option value="🧘">🧘 Meditação</option>

        </select>

        <label>XP</label>

        <input
          type="number"
          id="quest-xp"
          placeholder="25">

        <label>Moedas</label>

        <input
          type="number"
          id="quest-coins"
          placeholder="10">

        <label>Repetições Semanais</label>

        <input
          type="number"
          id="quest-weekly"
          placeholder="5">

        <button
          class="btn"
          onclick="addQuest()">

          Adicionar Quest

        </button>

        <p class="message" id="quest-message"></p>

      </div>

    </section>

    <!-- COLUNA DIREITA -->

    <section>

      <!-- QUESTS -->

      <div class="card">

        <h2>Quests</h2>

        <div id="quest-list"></div>

      </div>

      <!-- LOJA -->

      <div class="card">

        <h2>Loja</h2>

        <div id="shop-list"></div>

      </div>

      <!-- INVENTÁRIO -->

      <div class="card">

        <h2>Inventário</h2>

        <div id="inventory-list"></div>

      </div>

    </section>

  </main>

  <script>

    // LOGIN

    const loggedUser =
      localStorage.getItem("loggedUser");

    if(!loggedUser){

      window.location.href =
        "login.html";
    }

    // PLAYER

    let playerName =
      localStorage.getItem("playerName") || "Não criado";

    let playerClass =
      localStorage.getItem("playerClass") || "Nenhuma";

    let playerGender =
      localStorage.getItem("playerGender") || "masculino";

    let level =
      Number(localStorage.getItem("level")) || 1;

    let xp =
      Number(localStorage.getItem("xp")) || 0;

    let coins =
      Number(localStorage.getItem("coins")) || 0;

    let streak =
      Number(localStorage.getItem("streak")) || 0;

    // QUESTS

    let quests =
      JSON.parse(localStorage.getItem("quests")) || [];

    // INVENTÁRIO

    let ownedPets =
      JSON.parse(localStorage.getItem("ownedPets")) || [];

    let equippedPet =
      localStorage.getItem("equippedPet") || "";

    // ITENS DA LOJA

    const shopItems = [

      {
        id:"gato",
        emoji:"🐈",
        name:"Gato",
        price:120,
        description:"Um companheiro silencioso."
      },

      {
        id:"cachorro",
        emoji:"🐕",
        name:"Cachorro",
        price:140,
        description:"Um amigo leal."
      },

      {
        id:"pardal",
        emoji:"🐦",
        name:"Pardal de Ombro",
        price:180,
        description:"Descansa perto do personagem."
      },

      {
        id:"fantasma",
        emoji:"👻",
        name:"Fantasminha",
        price:450,
        description:"Flutua ao seu lado."
      },

      {
        id:"kitsune",
        emoji:"🦊",
        name:"Kitsune",
        price:900,
        description:"Raposa espiritual rara."
      },

      {
        id:"tamamo",
        emoji:"🌸",
        name:"Tamamo-no-Mae",
        price:2500,
        description:"Companheira lendária."
      }

    ];

    // SALVAR

    function saveProgress(){

      localStorage.setItem("level", level);

      localStorage.setItem("xp", xp);

      localStorage.setItem("coins", coins);

      localStorage.setItem("streak", streak);

      localStorage.setItem(
        "quests",
        JSON.stringify(quests)
      );

      localStorage.setItem(
        "ownedPets",
        JSON.stringify(ownedPets)
      );

      localStorage.setItem(
        "equippedPet",
        equippedPet
      );
    }

    // PERFIL

    function updateProfile(){

      const avatar =
        document.getElementById("player-avatar");

      if(playerGender === "masculino"){

        avatar.src =
          "avatar-masculino.png";

      }else{

        avatar.src =
          "avatar-feminino.png";
      }

      document.getElementById("logged-user")
        .innerText = loggedUser;

      document.getElementById("player-name")
        .innerText = playerName;

      document.getElementById("player-class")
        .innerText = playerClass;

      document.getElementById("level")
        .innerText = level;

      document.getElementById("xp")
        .innerText = xp;

      document.getElementById("coins")
        .innerText = coins;

      document.getElementById("streak")
        .innerText = streak;

      document.getElementById("xp-fill")
        .style.width = xp + "%";

      const pet =
        shopItems.find(item => item.id === equippedPet);

      document.getElementById("equipped-pet")
        .innerText =
        pet ? `${pet.emoji} ${pet.name}` : "Nenhum";
    }

    // QUESTS

    function addQuest(){

      const name =
        document.getElementById("quest-name").value;

      const icon =
        document.getElementById("quest-icon").value;

      const questXp =
        Number(document.getElementById("quest-xp").value);

      const questCoins =
        Number(document.getElementById("quest-coins").value);

      const weeklyLimit =
        Number(document.getElementById("quest-weekly").value);

      if(name.trim() === ""){
        return;
      }

      const newQuest = {

        id:Date.now(),

        name:name,

        icon:icon,

        xp:questXp,

        coins:questCoins,

        weeklyLimit:weeklyLimit,

        completedThisWeek:0
      };

      quests.push(newQuest);

      saveProgress();

      renderQuests();
    }

    function renderQuests(){

      const questList =
        document.getElementById("quest-list");

      questList.innerHTML = "";

      quests.forEach(function(quest){

        const questElement =
          document.createElement("div");

        questElement.className = "quest";

        questElement.innerHTML = `

          <div>

            <h3>
              ${quest.icon} ${quest.name}
            </h3>

            <p>

              +${quest.xp} XP •
              +${quest.coins} moedas

            </p>

          </div>

          <button
            class="btn"
            onclick="completeQuest(${quest.id})">

            Concluir

          </button>
        `;

        questList.appendChild(questElement);
      });
    }

    function completeQuest(id){

      const quest =
        quests.find(q => q.id === id);

      xp += quest.xp;

      coins += quest.coins;

      while(xp >= 100){

        level++;

        xp -= 100;
      }

      saveProgress();

      updateProfile();
    }

    // LOJA

    function renderShop(){

      const shopList =
        document.getElementById("shop-list");

      shopList.innerHTML = "";

      shopItems.forEach(function(item){

        const owned =
          ownedPets.includes(item.id);

        const shopElement =
          document.createElement("div");

        shopElement.className = "shop-item";

        shopElement.innerHTML = `

          <div>

            <h3>
              ${item.emoji} ${item.name}
            </h3>

            <p>

              ${item.description}

              <br>

              ${item.price} moedas

            </p>

          </div>

          <button
            class="btn"
            onclick="buyPet('${item.id}')">

            ${owned ? "Comprado" : "Comprar"}

          </button>
        `;

        shopList.appendChild(shopElement);
      });
    }

    function buyPet(id){

      if(ownedPets.includes(id)){
        return;
      }

      const item =
        shopItems.find(p => p.id === id);

      if(coins < item.price){

        alert("Moedas insuficientes.");

        return;
      }

      coins -= item.price;

      ownedPets.push(id);

      saveProgress();

      updateProfile();

      renderShop();

      renderInventory();
    }

    // INVENTÁRIO

    function renderInventory(){

      const inventory =
        document.getElementById("inventory-list");

      inventory.innerHTML = "";

      if(ownedPets.length === 0){

        inventory.innerHTML = `
          <p class="empty">
            Nenhum item comprado ainda.
          </p>
        `;

        return;
      }

      ownedPets.forEach(function(id){

        const item =
          shopItems.find(p => p.id === id);

        const equipped =
          equippedPet === id;

        const inventoryElement =
          document.createElement("div");

        inventoryElement.className =
          "inventory-item";

        inventoryElement.innerHTML = `

          <div>

            <h3>
              ${item.emoji} ${item.name}
            </h3>

            <p>
              ${item.description}
            </p>

          </div>

          <div>

            <button
              class="btn"
              onclick="equipPet('${id}')">

              ${equipped ? "Equipado" : "Equipar"}

            </button>

            ${
              equipped
              ?

              `
              <button
                class="btn danger-btn"
                onclick="unequipPet()">

                Desequipar

              </button>
              `
              :

              ""
            }

          </div>
        `;

        inventory.appendChild(inventoryElement);
      });
    }

    function equipPet(id){

      equippedPet = id;

      saveProgress();

      updateProfile();

      renderInventory();
    }

    function unequipPet(){

      equippedPet = "";

      saveProgress();

      updateProfile();

      renderInventory();
    }

    // LOGOUT

    function logout(){

      localStorage.removeItem("loggedUser");

      window.location.href =
        "login.html";
    }

    // INICIAR

    updateProfile();

    renderQuests();

    renderShop();

    renderInventory();

  </script>

</body>
</html>
